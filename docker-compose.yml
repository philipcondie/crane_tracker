services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crane_tracker
    ports:
      - "5531:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  test_db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crane_tracker_test
    ports:
      - "5532:5432"
      
volumes:
  pgdata: